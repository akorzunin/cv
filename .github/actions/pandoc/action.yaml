name: pandoc run
description: Action to run pandoc and generate final pdf/md files

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - uses: go-task/setup-task@v2

    - uses: pandoc/actions/setup@v1
      with:
        version: "3.2"

    - name: install pdf engine and fonts
      shell: bash
      run: >-
        sudo apt-get install -y
        texlive-xetex
        texlive-lang-cyrillic
        fonts-open-sans

    - name: Buld all files w/ pandoc
      shell: bash
      run: task all

    - uses: actions/upload-artifact@v6
      with:
        name: pandoc-output
        path: ./static/files
        retention-days: 1
